<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EPL Scheduler{% endblock %} — Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="main-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">
      <span class="badge bg-primary me-2" style="font-size:.7rem;vertical-align:middle">EPL</span>Scheduler
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/schedule' %}active{% endif %}" href="/schedule">Schedule</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/accuracy' %}active{% endif %}" href="/accuracy">Accuracy</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/solvers' %}active{% endif %}" href="/solvers">Solvers</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/calendar' %}active{% endif %}" href="/calendar">Calendar</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 mt-4 border-top small">
  EPL Scheduler — Analytics Dashboard &nbsp;·&nbsp; 2025/26 Season
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
